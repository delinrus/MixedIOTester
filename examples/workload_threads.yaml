target:
  type: file
  path: /mnt/c/fio-test/fio.dat
  size: 1GiB
  direct: true
  create_if_missing: true

io:
  engine: threads
  alignment: 4096

test:
  runtime_sec: 20
  warmup_sec: 5
  num_threads: 8
  region_start: 0
  region_size: 512MiB
  random_seed: 12345

operations:
  RR:
    enabled: true
    share: 0.50
    block_size: 4KiB
  RW:
    enabled: true
    share: 0.20
    block_size: 8KiB
  SR:
    enabled: true
    share: 0.10
    block_size: 64KiB
  SW:
    enabled: true
    share: 0.20
    block_size: 256KiB

output:
  print_summary: true
  save_json: true
  save_csv: true
  json_path: ./result.json
  csv_path: ./result.csv

runtime:
  abort_on_error: false
  debug_logging: false

calibration:
  enabled: false
  output_path: ./calibration.csv
  append: true
  runtime_sec: 60
  warmup_sec: 0
  # If empty, will use unique block sizes from enabled operations.
  block_sizes: [4KiB, 8KiB, 16KiB, 32KiB, 64KiB, 128KiB, 256KiB, 1MiB]
  # Optional per-mode thread count override (iodepth column).
  # num_threads:
  #   RR: 32
  #   RW: 32
  #   SR: 32
  #   SW: 2
  name_prefix: ""

